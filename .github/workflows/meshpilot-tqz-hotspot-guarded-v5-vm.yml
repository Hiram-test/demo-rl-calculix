name: MeshPilot TQZ strict-guard polished hotspot V5 VM

on:
  push:
    branches:
      - agent/meshpilot-hotspot-stepwise-pso
    paths:
      - archived-src/meshpilot_tqz_hotspot_batch_v5.py
      - archived-src/tests/test_meshpilot_tqz_hotspot_transfer_guard.py
      - .github/workflows/meshpilot-tqz-hotspot-guarded-v5-vm.yml
  pull_request:
    paths:
      - archived-src/meshpilot_tqz_hotspot_batch_v5.py
      - archived-src/tests/test_meshpilot_tqz_hotspot_transfer_guard.py
      - .github/workflows/meshpilot-tqz-hotspot-guarded-v5-vm.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  strict-guard-real-six-case:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install real Gmsh, CalculiX and NumPy
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install numpy --quiet
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gmsh calculix-ccx
      - name: Compile and test strict transfer gate
        working-directory: archived-src
        run: |
          python -m py_compile \
            meshpilot_coordinate_polished_round_pso.py \
            meshpilot_tqz_hotspot_batch_v4.py \
            meshpilot_tqz_hotspot_batch_v5.py
          python -m unittest discover -s tests -p 'test_meshpilot_coordinate_polished_round_pso.py' -v
          python -m unittest discover -s tests -p 'test_meshpilot_tqz_hotspot_transfer_guard.py' -v
          python -m unittest discover -s tests -p 'test_meshpilot_tqz_hotspot.py' -v
      - name: Resolve real solvers
        id: solvers
        shell: bash
        run: |
          set -euo pipefail
          GMSH_BIN="$(command -v gmsh)"
          CCX_BIN="$(command -v ccx || true)"
          if [[ -z "$CCX_BIN" ]]; then
            CCX_BIN="$(find /usr/bin -maxdepth 1 -type f -name 'ccx*' | sort | head -n1)"
          fi
          test -x "$GMSH_BIN"
          test -x "$CCX_BIN"
          echo "gmsh=$GMSH_BIN" >> "$GITHUB_OUTPUT"
          echo "ccx=$CCX_BIN" >> "$GITHUB_OUTPUT"
      - name: Run strict-guard four-method real comparison
        working-directory: archived-src
        shell: bash
        run: |
          set -o pipefail
          python meshpilot_tqz_hotspot_batch_v5.py \
            --request examples/meshpilot_tqz_hotspot_request.json \
            --output meshpilot_tqz_hotspot_v5_results \
            --gmsh-cmd '${{ steps.solvers.outputs.gmsh }}' \
            --ccx-cmd '${{ steps.solvers.outputs.ccx }}' \
            2>&1 | tee meshpilot_tqz_hotspot_v5.log
      - name: Validate real solver, strict gate and FE budgets
        working-directory: archived-src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('meshpilot_tqz_hotspot_v5_results/hotspot_batch_results.json').read_text())
          assert data['real_solver_only'] is True
          assert data['surrogate_used'] is False
          summary = data['summary']
          assert summary['completed_cases'] == 6, summary
          methods = (
              'fixed_round_cold',
              'hotspot_round_cold',
              'hotspot_polished_pso_cold',
              'hotspot_polished_pso_transfer',
          )
          limit = int(data['pso']['max_unique_evaluations'])
          accepted = 0
          fallback = 0
          for method in methods:
              assert summary['methods'][method]['feasible_cases'] == 6
          for case in data['cases']:
              assert case['status'] == 'completed', case
              assert len(case['hotspot_candidates']) == 6
              for method in methods:
                  row = case[method]
                  assert row['best_feasible']
                  assert row['unique_fe_evaluations'] <= limit
              probe = case.get('transfer_warm_probe')
              status = case.get('transfer_guard_status')
              if probe is None:
                  assert status == 'not_applicable'
              elif status == 'accepted':
                  accepted += 1
                  assert probe['feasible']
                  assert probe['objective'] <= 0.75 * case['coarse_objective'] + 1e-14
              elif status == 'fallback_full_budget':
                  fallback += 1
                  assert (not probe['feasible']) or probe['objective'] > 0.75 * case['coarse_objective'] - 1e-14
              elif status == 'accepted_same_as_coarse':
                  accepted += 1
              else:
                  raise AssertionError((case['case_id'], status))
          assert accepted >= 1, summary
          assert fallback >= 1, summary
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          PY
      - name: Upload strict-guard real-hotspot artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meshpilot-tqz-strict-guard-polished-hotspot-v5-full-vm
          path: |
            archived-src/meshpilot_tqz_hotspot_v5.log
            archived-src/meshpilot_tqz_hotspot_v5_results/hotspot_batch_results.json
            archived-src/meshpilot_tqz_hotspot_v5_results/hotspot_batch_metrics.csv
            archived-src/meshpilot_tqz_hotspot_v5_results/hotspot_batch_report.md
          compression-level: 6
          retention-days: 14
