name: MeshPilot TQZ CalculiX diagnostic

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/meshpilot-tqz-diagnostic.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose-six-references:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meshpilot-tqz-support-family
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Gmsh, CalculiX and Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install numpy --quiet
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gmsh calculix-ccx
      - name: Resolve solvers
        id: solvers
        shell: bash
        run: |
          set -euo pipefail
          echo "gmsh=$(command -v gmsh)" >> "$GITHUB_OUTPUT"
          CCX_BIN="$(command -v ccx || true)"
          if [[ -z "$CCX_BIN" ]]; then
            CCX_BIN="$(find /usr/bin -maxdepth 1 -type f -name 'ccx*' | sort | head -n1)"
          fi
          test -x "$CCX_BIN"
          echo "ccx=$CCX_BIN" >> "$GITHUB_OUTPUT"
      - name: Run six-case diagnostic batch
        working-directory: archived-src
        shell: bash
        continue-on-error: true
        run: |
          set -o pipefail
          python meshpilot_tqz_batch.py \
            --request examples/meshpilot_tqz_support_family.json \
            --output meshpilot_tqz_diagnostic_results \
            --gmsh-cmd '${{ steps.solvers.outputs.gmsh }}' \
            --ccx-cmd '${{ steps.solvers.outputs.ccx }}' \
            2>&1 | tee meshpilot_tqz_diagnostic.log
      - name: Summarize CalculiX failures
        working-directory: archived-src
        if: always()
        shell: bash
        run: |
          echo '=== CASE FAILURES ==='
          grep -n 'TQZ FAILURE' meshpilot_tqz_diagnostic.log || true
          echo '=== CCX STDERR ==='
          find meshpilot_tqz_diagnostic_results -name 'ccx.stderr.log' -print -exec sh -c 'echo --- $1; tail -n 80 "$1"' _ {} \; || true
          echo '=== CCX STDOUT ==='
          find meshpilot_tqz_diagnostic_results -name 'ccx.stdout.log' -print -exec sh -c 'echo --- $1; tail -n 120 "$1"' _ {} \; || true
          echo '=== DAT/STA/CVG TAILS ==='
          find meshpilot_tqz_diagnostic_results \( -name 'model.dat' -o -name 'model.sta' -o -name 'model.cvg' \) -print -exec sh -c 'echo --- $1; tail -n 120 "$1"' _ {} \; || true
      - name: Upload complete diagnostic tree
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meshpilot-tqz-calculix-diagnostic
          path: |
            archived-src/meshpilot_tqz_diagnostic.log
            archived-src/meshpilot_tqz_diagnostic_results/
          compression-level: 6
          retention-days: 14
