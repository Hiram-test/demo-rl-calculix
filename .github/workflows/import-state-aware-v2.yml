name: Import state-aware DQN V2

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/v2-bundle.part-*

permissions:
  contents: write

jobs:
  import-v2:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Decode and verify source bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/v2-bundle.part-* | base64 --decode > /tmp/state-aware-v2.tar.gz
          echo "4d32e3014791c2c3aa6555b2737b273efcacadc7749cd6887a0be82b7d3248cf  /tmp/state-aware-v2.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/state-aware-v2.tar.gz

      - name: Commit imported V2 source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archived-src
          if git diff --cached --quiet; then
            echo "V2 source already imported."
            exit 0
          fi
          git commit -m "Add state-aware global cell-action DQN V2"
          git push origin HEAD:agent/dqn-state-fix
