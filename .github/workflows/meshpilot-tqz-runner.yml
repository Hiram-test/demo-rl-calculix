name: MeshPilot TQZ support-family full VM runner

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/meshpilot-tqz-runner.yml
  pull_request:
    branches:
      - main
    paths:
      - archived-src/meshpilot_pso.py
      - archived-src/meshpilot_tqz_backend.py
      - archived-src/meshpilot_tqz_batch.py
      - archived-src/examples/meshpilot_tqz_support_family.json
      - archived-src/tests/test_meshpilot_tqz.py
      - docs/MESHPILOT_TQZ_SUPPORT_FAMILY.md
      - docs/MESHPILOT_TQZ_SUPPORT_VM_RESULTS.md
      - .github/workflows/meshpilot-tqz-support-vm.yml
      - .github/workflows/meshpilot-tqz-runner.yml

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meshpilot-tqz-support-family
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install numpy --quiet
      - name: Compile TQZ modules
        working-directory: archived-src
        run: |
          python -m py_compile \
            meshpilot_pso.py \
            meshpilot_tqz_backend.py \
            meshpilot_tqz_batch.py
      - name: Run TQZ regression tests
        working-directory: archived-src
        run: |
          python -m unittest discover -s tests -p 'test_meshpilot_tqz.py' -v

  real-calculix-tqz-batch:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meshpilot-tqz-support-family
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Gmsh, CalculiX and Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip --quiet
          python -m pip install numpy --quiet
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gmsh calculix-ccx
      - name: Resolve solver commands
        id: solvers
        shell: bash
        run: |
          set -euo pipefail
          GMSH_BIN="$(command -v gmsh)"
          CCX_BIN="$(command -v ccx || true)"
          if [[ -z "$CCX_BIN" ]]; then
            CCX_BIN="$(find /usr/bin -maxdepth 1 -type f -name 'ccx*' | sort | head -n1)"
          fi
          test -x "$GMSH_BIN"
          test -x "$CCX_BIN"
          echo "gmsh=$GMSH_BIN" >> "$GITHUB_OUTPUT"
          echo "ccx=$CCX_BIN" >> "$GITHUB_OUTPUT"
          "$GMSH_BIN" --version
          "$CCX_BIN" -v || true
      - name: Expand ordered TQZ manifest
        working-directory: archived-src
        run: |
          python meshpilot_tqz_batch.py \
            --request examples/meshpilot_tqz_support_family.json \
            --manifest-only > meshpilot_tqz_manifest.json
      - name: Run full six-case cold versus guarded transfer calculation
        working-directory: archived-src
        shell: bash
        run: |
          set -o pipefail
          python meshpilot_tqz_batch.py \
            --request examples/meshpilot_tqz_support_family.json \
            --output meshpilot_tqz_vm_results \
            --gmsh-cmd '${{ steps.solvers.outputs.gmsh }}' \
            --ccx-cmd '${{ steps.solvers.outputs.ccx }}' \
            2>&1 | tee meshpilot_tqz_vm.log
      - name: Validate full result contract and force resultants
        working-directory: archived-src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('meshpilot_tqz_vm_results/tqz_batch_results.json').read_text())
          summary = data['summary']
          assert summary['completed_cases'] == 6, summary
          assert summary['cold']['feasible_cases'] == 6, summary
          assert summary['transfer']['feasible_cases'] == 6, summary
          limit = int(data['pso']['max_unique_evaluations'])
          for case in data['cases']:
              assert case['status'] == 'completed', case
              for method in ('cold', 'transfer'):
                  row = case[method]
                  assert row['unique_fe_evaluations'] <= limit, (case['case_id'], method, row)
                  assert row['best_feasible'], (case['case_id'], method, row)
              raw = case['case']
              reference = case['reference']
              expected_vertical = -float(raw['nominal_vertical_capacity_kN']) * 1000.0
              expected_horizontal = 1.5 * float(raw['ag']) * abs(expected_vertical)
              expected_moment = -expected_horizontal * float(raw['H'])
              assert abs(reference['total_vertical_force'] - expected_vertical) <= max(1e-3, abs(expected_vertical) * 1e-10)
              assert abs(reference['total_horizontal_force'] - expected_horizontal) <= max(1e-3, abs(expected_horizontal) * 1e-10)
              assert abs(reference['applied_moment_y'] - expected_moment) <= max(1e-2, abs(expected_moment) * 1e-10)
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          PY
      - name: Collect reference, coarse and winning solver decks
        working-directory: archived-src
        if: always()
        run: |
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path

          source = Path('meshpilot_tqz_vm_results')
          keep = Path('meshpilot_tqz_vm_keep')
          keep.mkdir(exist_ok=True)
          result_file = source / 'tqz_batch_results.json'
          if result_file.exists():
              data = json.loads(result_file.read_text())
              for case in data.get('cases', []):
                  if case.get('status') != 'completed':
                      continue
                  case_id = case['case_id']
                  for label, path_text in (
                      ('reference', case['reference']['workdir']),
                      ('coarse', case['coarse']['workdir']),
                      ('cold_best', case['cold']['best_metadata'].get('workdir')),
                      ('transfer_best', case['transfer']['best_metadata'].get('workdir')),
                  ):
                      if not path_text:
                          continue
                      path = Path(path_text)
                      if path.exists():
                          shutil.copytree(path, keep / case_id / label, dirs_exist_ok=True)
          PY
      - name: Upload TQZ full-calculation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meshpilot-tqz-support-family-full-vm
          path: |
            archived-src/meshpilot_tqz_manifest.json
            archived-src/meshpilot_tqz_vm.log
            archived-src/meshpilot_tqz_vm_results/tqz_batch_results.json
            archived-src/meshpilot_tqz_vm_results/tqz_batch_metrics.csv
            archived-src/meshpilot_tqz_vm_results/tqz_batch_report.md
            archived-src/meshpilot_tqz_vm_keep/
          compression-level: 6
          retention-days: 14
