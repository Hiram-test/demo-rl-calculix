name: State-aware DQN V2 tests

on:
  push:
    branches:
      - agent/dqn-state-fix
  pull_request:
    paths:
      - archived-src/state_aware_dqn_agent.py
      - archived-src/state_aware_env.py
      - archived-src/mesh_goal.py
      - archived-src/calculix_backend.py
      - archived-src/rl_main_state_aware.py
      - archived-src/rl_main_local.py
      - archived-src/examples/**
      - archived-src/scripts/**
      - archived-src/tests/**
      - archived-src/requirements-state-aware.txt
      - .github/workflows/state-aware-v2-tests.yml

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: archived-src/requirements-state-aware.txt

      - name: Install test dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip --quiet
          python -m pip install numpy --quiet
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet

      - name: Compile V2 modules
        working-directory: archived-src
        run: |
          python -m py_compile \
            state_aware_dqn_agent.py \
            state_aware_env.py \
            mesh_goal.py \
            calculix_backend.py \
            rl_main_state_aware.py \
            rl_main_local.py

      - name: Run V2 regression tests
        working-directory: archived-src
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v

  calculix-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: archived-src/requirements-state-aware.txt

      - name: Install Python and solver dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip --quiet
          python -m pip install numpy --quiet
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet
          sudo apt-get update -qq >/tmp/apt-update.log 2>&1
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gmsh calculix-ccx \
            >/tmp/apt-install.log 2>&1

      - name: Locate local solver commands
        id: solvers
        shell: bash
        run: |
          set -euo pipefail
          GMSH_BIN="$(command -v gmsh)"
          CCX_BIN="$(command -v ccx || true)"
          if [[ -z "$CCX_BIN" ]]; then
            CCX_BIN="$(find /usr/bin -maxdepth 1 -type f -name 'ccx*' | sort | head -n 1)"
          fi
          test -x "$GMSH_BIN"
          test -x "$CCX_BIN"
          echo "gmsh=$GMSH_BIN" >> "$GITHUB_OUTPUT"
          echo "ccx=$CCX_BIN" >> "$GITHUB_OUTPUT"
          echo "gmsh=$GMSH_BIN"
          echo "ccx=$CCX_BIN"
          "$GMSH_BIN" --version
          "$CCX_BIN" -v || true

      - name: Run a real Gmsh and CalculiX solve
        working-directory: archived-src
        shell: bash
        run: |
          set -o pipefail
          if ! python rl_main_local.py \
            --backend calculix \
            --mode solve \
            --gmsh-cmd '${{ steps.solvers.outputs.gmsh }}' \
            --ccx-cmd '${{ steps.solvers.outputs.ccx }}' \
            --plate-config examples/calculix_plate.json \
            --goal-file examples/goal_local.json \
            --simulations-root simulations_ci/calculix \
            --ckpt-dir checkpoints_ci/calculix \
            --global-mesh-size 1.2 \
            --baseline-mesh-size 0.6 \
            --cell-min-mesh-size 0.15 \
            --cell-max-mesh-size 2.0 \
            --min-elements 1 \
            --max-elements 50000 \
            --solver-timeout 180 \
            > /tmp/calculix-smoke.log 2>&1; then
            echo '--- CalculiX smoke output ---'
            cat /tmp/calculix-smoke.log
            echo '--- generated files ---'
            find simulations_ci -maxdepth 5 -type f -printf '%p\n' | sort || true
            echo '--- solver logs ---'
            find simulations_ci -type f \( -name '*.log' -o -name '*.sta' -o -name '*.dat' \) \
              -print -exec sh -c 'echo "===== $1 ====="; tail -n 120 "$1"' _ {} \; || true
            exit 1
          fi
          cat /tmp/calculix-smoke.log

      - name: Upload CalculiX smoke diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: calculix-smoke-diagnostics
          path: |
            archived-src/simulations_ci/
            /tmp/calculix-smoke.log
            /tmp/apt-install.log
          if-no-files-found: warn
          retention-days: 3
