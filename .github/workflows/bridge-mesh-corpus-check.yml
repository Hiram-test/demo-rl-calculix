name: Bridge FEA mesh corpus check

on:
  push:
    branches:
      - agent/bridge-fea-mesh-requirements-clean
    paths:
      - data/bridge_fea_mesh_cases/**
      - data/bridge_engineer_questions/**
      - data/bridge_mesh_question_templates.json
      - docs/bridge_fea_mesh/**
      - schemas/bridge_mesh_intent.schema.json
      - scripts/validate_bridge_mesh_corpus.py
      - .github/workflows/bridge-mesh-corpus-check.yml
  pull_request:
    paths:
      - data/bridge_fea_mesh_cases/**
      - data/bridge_engineer_questions/**
      - data/bridge_mesh_question_templates.json
      - docs/bridge_fea_mesh/**
      - schemas/bridge_mesh_intent.schema.json
      - scripts/validate_bridge_mesh_corpus.py
      - .github/workflows/bridge-mesh-corpus-check.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-corpus:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate case sources, engineer questions and JSON contracts
        run: python scripts/validate_bridge_mesh_corpus.py
