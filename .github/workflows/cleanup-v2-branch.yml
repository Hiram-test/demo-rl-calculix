name: Clean archived source for V2 PR

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/workflows/cleanup-v2-branch.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Remove generated and editor artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf archived-src/__pycache__ archived-src/.vscode
          rm -f archived-src/*.pyc
          rm -f archived-src/example-upgrade.log archived-src/file-list.txt
          rm -f archived-src/DEMO.jnl archived-src/DEMO_.jnl
          cat > archived-src/.gitignore <<'EOF'
          __pycache__/
          *.py[cod]
          .vscode/
          simulations*/
          checkpoints*/
          *.odb
          *.lck
          *.sta
          *.msg
          *.dat
          EOF

      - name: Commit cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A archived-src
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Clean generated artifacts from archived RL source"
          git push origin HEAD:agent/dqn-state-fix
