name: Import dual local backends

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/dual-backend.bundle.part-*
      - .github/workflows/import-dual-backend.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Decode and verify source bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/dual-backend.bundle.part-* | base64 --decode > /tmp/dual-backend.tar.gz
          echo "3b8776edd58656a5bc02f007ede7b2fc16805795de6eda46fbfb235a220c83ce  /tmp/dual-backend.tar.gz" \
            | sha256sum --check --strict
          mkdir -p archived-src
          tar -xzf /tmp/dual-backend.tar.gz -C archived-src

      - name: Commit imported sources and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/dual-backend.bundle.part-*
          rm -f .github/workflows/import-dual-backend.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Add local Abaqus and CalculiX backends"
          git push origin HEAD:agent/dqn-state-fix
