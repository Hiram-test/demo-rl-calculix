name: Import MeshPilot batch-transfer PSO bundle

on:
  push:
    branches:
      - agent/meshpilot-batch-transfer-pso
    paths:
      - .github/meshpilot-bundle.ready
  pull_request:
    paths:
      - .github/meshpilot-bundle.ready
      - .github/meshpilot-bundle.part-*
      - .github/workflows/import-meshpilot-batch-pso.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meshpilot-batch-transfer-pso

      - name: Decode and verify source bundle
        shell: bash
        run: |
          set -euo pipefail
          cat .github/meshpilot-bundle.part-* | base64 --decode > /tmp/meshpilot-batch-pso.tar.gz
          echo "c05b7360a5354d3e7e0c53dd4a523f567dc8a42ab6beb7913564e1d06add90ca  /tmp/meshpilot-batch-pso.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/meshpilot-batch-pso.tar.gz

      - name: Commit imported source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "4189826+github-actions[bot]@users.noreply.github.com"
          git add archived-src/meshpilot_pso.py \
                  archived-src/meshpilot_batch_agent.py \
                  archived-src/examples/meshpilot_batch_request.json \
                  archived-src/tests/test_meshpilot_pso.py \
                  archived-src/tests/test_meshpilot_batch_agent.py \
                  docs/MESHPILOT_BATCH_TRANSFER_PSO.md
          if git diff --cached --quiet; then
            echo "MeshPilot source already imported."
            exit 0
          fi
          git commit -m "Add MeshPilot batch-transfer PSO prototype"
          git push origin HEAD:agent/meshpilot-batch-transfer-pso
