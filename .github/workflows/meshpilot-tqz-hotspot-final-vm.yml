name: MeshPilot TQZ final real-hotspot polished PSO VM

on:
  push:
    branches:
      - agent/meshpilot-hotspot-stepwise-pso
    paths:
      - archived-src/meshpilot_tqz_hotspot_backend.py
      - archived-src/meshpilot_coordinate_polished_round_pso.py
      - archived-src/meshpilot_tqz_hotspot_batch.py
      - archived-src/meshpilot_tqz_hotspot_batch_v4.py
      - archived-src/meshpilot_tqz_hotspot_batch_v5.py
      - archived-src/meshpilot_tqz_hotspot_final.py
      - archived-src/examples/meshpilot_tqz_hotspot_request.json
      - archived-src/tests/test_meshpilot_tqz_hotspot.py
      - archived-src/tests/test_meshpilot_coordinate_polished_round_pso.py
      - archived-src/tests/test_meshpilot_tqz_hotspot_transfer_guard.py
      - docs/MESHPILOT_TQZ_HOTSPOT_STEPWISE_PSO.md
      - docs/MESHPILOT_TQZ_HOTSPOT_STEPWISE_VM_RESULTS.md
      - .github/workflows/meshpilot-tqz-hotspot-final-vm.yml
  pull_request:
    paths:
      - archived-src/meshpilot_tqz_hotspot_backend.py
      - archived-src/meshpilot_coordinate_polished_round_pso.py
      - archived-src/meshpilot_tqz_hotspot_batch.py
      - archived-src/meshpilot_tqz_hotspot_batch_v4.py
      - archived-src/meshpilot_tqz_hotspot_batch_v5.py
      - archived-src/meshpilot_tqz_hotspot_final.py
      - archived-src/examples/meshpilot_tqz_hotspot_request.json
      - archived-src/tests/test_meshpilot_tqz_hotspot.py
      - archived-src/tests/test_meshpilot_coordinate_polished_round_pso.py
      - archived-src/tests/test_meshpilot_tqz_hotspot_transfer_guard.py
      - docs/MESHPILOT_TQZ_HOTSPOT_STEPWISE_PSO.md
      - docs/MESHPILOT_TQZ_HOTSPOT_STEPWISE_VM_RESULTS.md
      - .github/workflows/meshpilot-tqz-hotspot-final-vm.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  final-real-hotspot-six-case:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install real Gmsh, CalculiX and NumPy
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install numpy --quiet
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gmsh calculix-ccx
      - name: Compile and run accepted-method tests
        working-directory: archived-src
        run: |
          python -m py_compile \
            meshpilot_tqz_hotspot_backend.py \
            meshpilot_coordinate_polished_round_pso.py \
            meshpilot_tqz_hotspot_batch.py \
            meshpilot_tqz_hotspot_batch_v4.py \
            meshpilot_tqz_hotspot_batch_v5.py \
            meshpilot_tqz_hotspot_final.py
          python -m unittest discover -s tests -p 'test_meshpilot_tqz_hotspot.py' -v
          python -m unittest discover -s tests -p 'test_meshpilot_coordinate_polished_round_pso.py' -v
          python -m unittest discover -s tests -p 'test_meshpilot_tqz_hotspot_transfer_guard.py' -v
      - name: Resolve real solvers
        id: solvers
        shell: bash
        run: |
          set -euo pipefail
          GMSH_BIN="$(command -v gmsh)"
          CCX_BIN="$(command -v ccx || true)"
          if [[ -z "$CCX_BIN" ]]; then
            CCX_BIN="$(find /usr/bin -maxdepth 1 -type f -name 'ccx*' | sort | head -n1)"
          fi
          test -x "$GMSH_BIN"
          test -x "$CCX_BIN"
          echo "gmsh=$GMSH_BIN" >> "$GITHUB_OUTPUT"
          echo "ccx=$CCX_BIN" >> "$GITHUB_OUTPUT"
          "$GMSH_BIN" --version
          "$CCX_BIN" -v || true
      - name: Expand accepted real-hotspot manifest
        working-directory: archived-src
        run: |
          python meshpilot_tqz_hotspot_final.py \
            --request examples/meshpilot_tqz_hotspot_request.json \
            --manifest-only > meshpilot_tqz_hotspot_final_manifest.json
      - name: Run accepted four-method six-case real calculation
        working-directory: archived-src
        shell: bash
        run: |
          set -o pipefail
          python meshpilot_tqz_hotspot_final.py \
            --request examples/meshpilot_tqz_hotspot_request.json \
            --output meshpilot_tqz_hotspot_final_results \
            --gmsh-cmd '${{ steps.solvers.outputs.gmsh }}' \
            --ccx-cmd '${{ steps.solvers.outputs.ccx }}' \
            2>&1 | tee meshpilot_tqz_hotspot_final.log
      - name: Validate accepted algorithm, business gate and real FE budget
        working-directory: archived-src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('meshpilot_tqz_hotspot_final_results/hotspot_batch_results.json').read_text())
          assert data['real_solver_only'] is True
          assert data['surrogate_used'] is False
          assert data['accepted_algorithm'] == 'coordinate_polished_rounded_pso'
          assert data['candidate_source'] == 'real_uniform_coarse_calculix_stress'
          assert data['transfer_policy']['warm_to_coarse_max_objective_ratio'] == 0.75
          summary = data['summary']
          assert summary['completed_cases'] == 6, summary
          methods = (
              'fixed_round_cold',
              'hotspot_round_cold',
              'hotspot_polished_pso_cold',
              'hotspot_polished_pso_transfer',
          )
          limit = int(data['pso']['max_unique_evaluations'])
          for method in methods:
              assert summary['methods'][method]['feasible_cases'] == 6
          for case in data['cases']:
              assert case['status'] == 'completed', case
              assert case['hotspot_source'] == 'real_uniform_coarse_calculix_stress'
              assert len(case['hotspot_candidates']) == 6
              raw = case['case']
              reference = case['reference']
              expected_vertical = -float(raw['nominal_vertical_capacity_kN']) * 1000.0
              expected_horizontal = 1.5 * float(raw['ag']) * abs(expected_vertical)
              expected_moment = -expected_horizontal * float(raw['H'])
              assert abs(reference['total_vertical_force'] - expected_vertical) <= max(1e-3, abs(expected_vertical) * 1e-10)
              assert abs(reference['total_horizontal_force'] - expected_horizontal) <= max(1e-3, abs(expected_horizontal) * 1e-10)
              assert abs(reference['applied_moment_y'] - expected_moment) <= max(1e-2, abs(expected_moment) * 1e-10)
              for method in methods:
                  row = case[method]
                  assert row['best_feasible']
                  assert row['unique_fe_evaluations'] <= limit
              probe = case.get('transfer_warm_probe')
              status = case.get('transfer_guard_status')
              if probe is not None and status == 'accepted':
                  assert probe['objective'] <= 0.75 * case['coarse_objective'] + 1e-14
          assert summary['methods']['hotspot_polished_pso_cold']['mean_best_objective'] < summary['methods']['hotspot_round_cold']['mean_best_objective']
          assert summary['methods']['hotspot_polished_pso_cold']['total_unique_fe_evaluations'] < summary['methods']['hotspot_round_cold']['total_unique_fe_evaluations']
          assert summary['methods']['hotspot_polished_pso_transfer']['mean_best_objective'] <= summary['methods']['hotspot_polished_pso_cold']['mean_best_objective']
          assert summary['methods']['hotspot_polished_pso_transfer']['total_unique_fe_evaluations'] < summary['methods']['hotspot_polished_pso_cold']['total_unique_fe_evaluations']
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          PY
      - name: Collect reference, coarse and four winning solver decks
        working-directory: archived-src
        if: always()
        run: |
          python - <<'PY'
          import json
          import shutil
          from pathlib import Path

          result_path = Path('meshpilot_tqz_hotspot_final_results/hotspot_batch_results.json')
          keep = Path('meshpilot_tqz_hotspot_final_keep')
          keep.mkdir(exist_ok=True)
          if result_path.exists():
              data = json.loads(result_path.read_text())
              methods = (
                  'fixed_round_cold',
                  'hotspot_round_cold',
                  'hotspot_polished_pso_cold',
                  'hotspot_polished_pso_transfer',
              )
              for case in data.get('cases', []):
                  if case.get('status') != 'completed':
                      continue
                  sources = [
                      ('reference', case['reference']['workdir']),
                      ('coarse', case['coarse']['workdir']),
                  ]
                  sources.extend((method, case[method]['best_metadata'].get('workdir')) for method in methods)
                  for label, source_text in sources:
                      if not source_text:
                          continue
                      source = Path(source_text)
                      if source.exists():
                          shutil.copytree(source, keep / case['case_id'] / label, dirs_exist_ok=True)
          PY
      - name: Upload accepted real-hotspot full artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meshpilot-tqz-final-real-hotspot-polished-full-vm
          path: |
            archived-src/meshpilot_tqz_hotspot_final_manifest.json
            archived-src/meshpilot_tqz_hotspot_final.log
            archived-src/meshpilot_tqz_hotspot_final_results/hotspot_batch_results.json
            archived-src/meshpilot_tqz_hotspot_final_results/hotspot_batch_metrics.csv
            archived-src/meshpilot_tqz_hotspot_final_results/hotspot_batch_report.md
            archived-src/meshpilot_tqz_hotspot_final_keep/
          compression-level: 6
          retention-days: 14
