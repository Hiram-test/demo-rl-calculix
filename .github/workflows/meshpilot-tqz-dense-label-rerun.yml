name: MeshPilot TQZ dense-label rerun

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/meshpilot-tqz-dense-label-rerun.yml
  pull_request:
    branches:
      - main
    paths:
      - archived-src/meshpilot_tqz_dense_tags.py
      - archived-src/meshpilot_tqz_batch_dense.py
      - docs/MESHPILOT_TQZ_SUPPORT_VM_RESULTS.md
  workflow_dispatch:

permissions:
  contents: read

jobs:
  full-six-case-rerun:
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/meshpilot-tqz-support-family
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Gmsh, CalculiX and NumPy
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install numpy --quiet
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq gmsh calculix-ccx
      - name: Verify sparse-tag normalization
        working-directory: archived-src
        run: |
          python -m py_compile meshpilot_tqz_dense_tags.py meshpilot_tqz_batch_dense.py
          python - <<'PY'
          from pathlib import Path
          from tempfile import TemporaryDirectory
          import meshpilot_tqz_backend as backend
          from meshpilot_tqz_dense_tags import renumber_support_mesh

          with TemporaryDirectory() as directory:
              path = Path(directory) / 'sparse.msh'
              path.write_text('''$MeshFormat
          2.2 0 8
          $EndMeshFormat
          $Nodes
          4
          10 0 0 0
          20 1 0 0
          40 0 1 0
          80 0 0 1
          $EndNodes
          $Elements
          1
          99 4 2 1 1 10 20 40 80
          $EndElements
          ''')
              dense = renumber_support_mesh(backend.parse_msh2_tetra(path))
              assert list(dense.nodes) == [1, 2, 3, 4], dense.nodes
              assert dense.tetrahedra == {1: (1, 2, 3, 4)}, dense.tetrahedra
          PY
      - name: Resolve solvers
        id: solvers
        shell: bash
        run: |
          set -euo pipefail
          echo "gmsh=$(command -v gmsh)" >> "$GITHUB_OUTPUT"
          CCX_BIN="$(command -v ccx || true)"
          if [[ -z "$CCX_BIN" ]]; then
            CCX_BIN="$(find /usr/bin -maxdepth 1 -type f -name 'ccx*' | sort | head -n1)"
          fi
          test -x "$CCX_BIN"
          echo "ccx=$CCX_BIN" >> "$GITHUB_OUTPUT"
      - name: Run complete dense-label TQZ batch
        working-directory: archived-src
        shell: bash
        run: |
          set -o pipefail
          python meshpilot_tqz_batch_dense.py \
            --request examples/meshpilot_tqz_support_family.json \
            --output meshpilot_tqz_dense_results \
            --gmsh-cmd '${{ steps.solvers.outputs.gmsh }}' \
            --ccx-cmd '${{ steps.solvers.outputs.ccx }}' \
            2>&1 | tee meshpilot_tqz_dense.log
      - name: Validate six completed cases and FE budgets
        working-directory: archived-src
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('meshpilot_tqz_dense_results/tqz_batch_results.json').read_text())
          summary = data['summary']
          assert summary['completed_cases'] == 6, summary
          assert summary['cold']['feasible_cases'] == 6, summary
          assert summary['transfer']['feasible_cases'] == 6, summary
          limit = int(data['pso']['max_unique_evaluations'])
          for case in data['cases']:
              assert case['status'] == 'completed', case
              for method in ('cold', 'transfer'):
                  assert case[method]['unique_fe_evaluations'] <= limit
                  assert case[method]['best_feasible']
              reference = case['reference']
              assert reference['node_count'] >= max(reference['mesh_signature'][1], 1)
          print(json.dumps(summary, indent=2, ensure_ascii=False))
          PY
      - name: Upload dense-label full results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: meshpilot-tqz-dense-label-full-vm
          path: |
            archived-src/meshpilot_tqz_dense.log
            archived-src/meshpilot_tqz_dense_results/
          compression-level: 6
          retention-days: 14
