name: Apply fixed-width FRD parser correction

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/frd-fixed-width.patch
      - .github/workflows/apply-frd-fixed-width.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Apply and validate parser patch
        shell: bash
        run: |
          set -euo pipefail
          git apply --check .github/frd-fixed-width.patch
          git apply .github/frd-fixed-width.patch
          cd archived-src
          python -m py_compile calculix_backend.py tests/test_calculix_backend.py

      - name: Commit correction and remove staging files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/frd-fixed-width.patch
          rm -f .github/workflows/apply-frd-fixed-width.yml
          git add -A
          git commit -m "Parse native fixed-width CalculiX FRD records"
          git push origin HEAD:agent/dqn-state-fix
