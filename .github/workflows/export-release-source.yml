name: Import archived RL source

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/workflows/export-release-source.yml

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Download and extract archive
        shell: bash
        run: |
          set -euo pipefail
          : > workflow-diagnostics.txt
          exec > >(tee -a workflow-diagnostics.txt) 2>&1

          date -u
          echo "commit=$GITHUB_SHA"
          echo "ref=$GITHUB_REF"

          curl --fail --location --retry 3 \
            "https://github.com/Hiram-test/demo-rl-calculix/releases/download/v1.0.0/demo.zip" \
            --output demo.zip

          echo "7E3F7E7E385BBFDE2581EADF457BD5154D899E682CDC12C61106956CFC78A553  demo.zip" \
            | sha256sum --check --strict

          rm -rf archived-src
          mkdir -p archived-src

          python - <<'PY'
          from pathlib import Path, PurePosixPath
          from zipfile import ZipFile

          destination = Path("archived-src").resolve()
          with ZipFile("demo.zip") as archive:
              for member in archive.infolist():
                  normalized = member.filename.replace("\\", "/")
                  relative = PurePosixPath(normalized)
                  if relative.is_absolute() or ".." in relative.parts:
                      raise RuntimeError(f"Unsafe archive path: {member.filename!r}")
                  target = destination.joinpath(*relative.parts)
                  if member.is_dir() or normalized.endswith("/"):
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(member) as source, target.open("wb") as output:
                      output.write(source.read())
          PY

          find archived-src -type f -printf '%p\n' | sort > archived-src/file-list.txt
          echo "Extracted $(wc -l < archived-src/file-list.txt) files."

      - name: Commit imported source
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workflow-diagnostics.txt
          if [[ -d archived-src ]]; then
            git add archived-src
          fi
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Import archived RL source for state-aware DQN refactor"
          git push origin HEAD:agent/dqn-state-fix
