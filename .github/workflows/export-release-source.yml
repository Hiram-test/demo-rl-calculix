name: Import archived RL source

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/workflows/export-release-source.yml

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Download and extract archive
        id: import
        continue-on-error: true
        shell: bash
        run: |
          set -uox pipefail
          : > workflow-diagnostics.txt
          {
            date -u
            echo "commit=$GITHUB_SHA"
            echo "ref=$GITHUB_REF"
            curl --version
            curl --fail --location --retry 3 \
              "https://github.com/Hiram-test/demo-rl-calculix/releases/download/v1.0.0/demo.zip" \
              --output demo.zip
            download_status=$?
            echo "download_status=$download_status"
            if [[ $download_status -eq 0 ]]; then
              sha256sum demo.zip
              echo "7E3F7E7E385BBFDE2581EADF457BD5154D899E682CDC12C61106956CFC78A553  demo.zip" \
                | sha256sum --check --strict
              checksum_status=$?
              echo "checksum_status=$checksum_status"
              if [[ $checksum_status -eq 0 ]]; then
                rm -rf archived-src
                mkdir -p archived-src
                unzip -q demo.zip -d archived-src
                find archived-src -type f -printf '%p\n' | sort > archived-src/file-list.txt
              fi
            fi
          } >> workflow-diagnostics.txt 2>&1

      - name: Commit source or diagnostics
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add workflow-diagnostics.txt
          if [[ -d archived-src ]]; then
            git add archived-src
          fi
          if git diff --cached --quiet; then
            echo "No generated changes."
            exit 0
          fi
          git commit -m "Capture archived RL source import result"
          git push origin HEAD:agent/dqn-state-fix
