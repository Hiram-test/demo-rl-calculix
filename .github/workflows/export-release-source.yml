name: Import archived RL source

on:
  push:
    branches:
      - agent/dqn-state-fix
    paths:
      - .github/workflows/export-release-source.yml

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out refactor branch
        uses: actions/checkout@v4
        with:
          ref: agent/dqn-state-fix

      - name: Download archived Abaqus demo
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 3 \
            "https://github.com/Hiram-test/demo-rl-calculix/releases/download/v1.0.0/demo.zip" \
            --output demo.zip
          echo "7E3F7E7E385BBFDE2581EADF457BD5154D899E682CDC12C61106956CFC78A553  demo.zip" \
            | sha256sum --check --strict

      - name: Extract source into branch
        shell: bash
        run: |
          set -euo pipefail
          rm -rf archived-src
          mkdir -p archived-src
          unzip -q demo.zip -d archived-src
          find archived-src -type f -printf '%p\n' | sort > archived-src/file-list.txt

      - name: Commit extracted source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add archived-src
          if git diff --cached --quiet; then
            echo "Archived source is already present."
            exit 0
          fi
          git commit -m "Import archived RL source for state-aware DQN refactor"
          git push origin HEAD:agent/dqn-state-fix
